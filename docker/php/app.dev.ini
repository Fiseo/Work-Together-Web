memory_limit = 1G              ; Symfony profiler + debug tools eat RAM
max_execution_time = 0         ; for long debug sessions / Xdebug

opcache.validate_timestamps = 1
opcache.revalidate_freq = 0    ; check every request
opcache.jit = off              ; avoids issues with Xdebug
; no opcache.preload in dev — it conflicts with cache:clear

display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Xdebug (if used)
xdebug.mode = debug,develop
xdebug.start_with_request = trigger
xdebug.client_host = 127.0.0.1
xdebug.client_port = 9003
opcache.enable = 0
opcache.enable_cli = 0
