services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.multi
      target: prod
    image: worktogether:1.0
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: dev-secret-change-me
      DATABASE_URL: "mysql://app:app@db:3306/app?serverVersion=8.0.32&charset=utf8mb4"
      MAILER_DSN: "smtp://mail:1025"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      DEFAULT_URI: "http://localhost:8000"
      XDEBUG_MODE: "off"
    ports:
      - "8001:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_DATABASE: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$MYSQL_PASSWORD\" mysqladmin ping -h localhost -uapp"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  db_data:
  app_var:
